name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ───────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff mypy types-passlib

      - name: Ruff lint
        run: ruff check app/ --select E,F,I,N,W,UP --ignore E501

      - name: Ruff format check
        run: ruff format --check app/

  backend-test:
    name: Backend — Pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # Tests use SQLite in-memory (conftest.py) — no Postgres service needed in CI
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          # conftest.py overrides these via os.environ.setdefault() before app import,
          # but set them here too for explicitness and any CI-level inspection.
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          SECRET_KEY: test-secret-key-minimum-32-characters-ci
          ENVIRONMENT: test
          ALLOW_PUBLIC_REGISTRATION: "true"
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          S3_BUCKET_EVIDENCE: lbro-test-evidence
          SQS_INCIDENT_QUEUE_URL: ""
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

  backend-build:
    name: Backend — Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: lbro-api:ci

      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: lbro-worker:ci

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

  frontend-build:
    name: Frontend — Vite Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_URL: /api/v1
        run: npm run build

      - name: Docker build
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: lbro-frontend:ci

  # ── Terraform ─────────────────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform — Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (local backend)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  # ── Security Scan ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security — Trivy + Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Setup Python for Bandit
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bandit SAST scan
        run: |
          pip install bandit
          bandit -r backend/app/ -ll -x backend/app/tests/ || true

  # ── Integration Gate ──────────────────────────────────────────────────────────
  ci-pass:
    name: CI Pass
    needs:
      - backend-lint
      - backend-test
      - backend-build
      - frontend-lint
      - frontend-build
      - terraform-validate
    runs-on: ubuntu-latest
    steps:
      - run: echo "All CI checks passed"
