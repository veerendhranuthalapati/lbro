name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  determine-environment:
    name: Determine Target Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: determine-environment
    environment: ${{ needs.determine-environment.outputs.environment }}
    permissions:
      id-token: write
      contents: read
    outputs:
      api_image: ${{ steps.meta-api.outputs.tags }}
      worker_image: ${{ steps.meta-worker.outputs.tags }}
      frontend_image: ${{ steps.meta-fe.outputs.tags }}
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta — API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/lbro-api
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ needs.determine-environment.outputs.environment == 'production' }}
            type=raw,value=${{ needs.determine-environment.outputs.environment }}

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker meta — Worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/lbro-worker
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ needs.determine-environment.outputs.environment == 'production' }}
            type=raw,value=${{ needs.determine-environment.outputs.environment }}

      - name: Build & push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker meta — Frontend
        id: meta-fe
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/lbro-frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ needs.determine-environment.outputs.environment == 'production' }}
            type=raw,value=${{ needs.determine-environment.outputs.environment }}

      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          build-args: VITE_API_URL=/api/v1
          tags: ${{ steps.meta-fe.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [determine-environment, build-and-push]
    if: needs.determine-environment.outputs.environment == 'staging'
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS API service
        run: |
          aws ecs update-service \
            --cluster lbro-staging-cluster \
            --service lbro-staging-api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Update ECS Worker service
        run: |
          aws ecs update-service \
            --cluster lbro-staging-cluster \
            --service lbro-staging-worker \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Update ECS Frontend service
        run: |
          aws ecs update-service \
            --cluster lbro-staging-cluster \
            --service lbro-staging-frontend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for API deployment
        run: |
          aws ecs wait services-stable \
            --cluster lbro-staging-cluster \
            --services lbro-staging-api \
            --region ${{ env.AWS_REGION }}
        timeout-minutes: 10

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [determine-environment, build-and-push]
    if: needs.determine-environment.outputs.environment == 'production'
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run database migrations
        run: |
          aws ecs run-task \
            --cluster lbro-production-cluster \
            --task-definition lbro-production-api \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PROD_PRIVATE_SUBNET_IDS }}],securityGroups=[${{ secrets.PROD_API_SG_ID }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["alembic","upgrade","head"]}]}' \
            --region ${{ env.AWS_REGION }}

      - name: Update ECS API service
        run: |
          aws ecs update-service \
            --cluster lbro-production-cluster \
            --service lbro-production-api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Update ECS Worker service
        run: |
          aws ecs update-service \
            --cluster lbro-production-cluster \
            --service lbro-production-worker \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Update ECS Frontend service
        run: |
          aws ecs update-service \
            --cluster lbro-production-cluster \
            --service lbro-production-frontend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for stable deployment
        run: |
          aws ecs wait services-stable \
            --cluster lbro-production-cluster \
            --services lbro-production-api lbro-production-frontend \
            --region ${{ env.AWS_REGION }}
        timeout-minutes: 15
