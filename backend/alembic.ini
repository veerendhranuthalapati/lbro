[alembic]
script_location = app/migrations
prepend_sys_path = .
version_path_separator = os

# Fallback URL used only for offline mode (alembic revision --autogenerate locally).
# At runtime the env.py reads DATABASE_URL from the environment variable, which
# overrides this value. Never rely on this URL inside a container.
sqlalchemy.url = postgresql+asyncpg://lbro:lbro@localhost:5432/lbro

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
