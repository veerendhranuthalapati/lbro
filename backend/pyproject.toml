[tool.ruff]
line-length = 100
target-version = "py312"
extend-select = ["I", "N", "UP", "B", "SIM", "RUF"]
ignore = ["B008", "N815"]
exclude = ["app/migrations/"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true
disallow_untyped_defs = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning"]

[tool.coverage.run]
source = ["app"]
concurrency = ["greenlet", "thread"]
omit = [
    "app/migrations/*",
    "tests/*",
    "app/worker/*",
    "app/workers/*",
    "app/core/aws_clients.py",
    "app/core/database.py",
    "app/database.py",
    "app/core/logging.py",
    "app/core/config.py",
    "app/routers/infrastructure.py",
    "app/routers/security_score.py",
    "app/services/notification_service.py",
    "app/services/s3_service.py",
    "app/services/sqs_service.py",
    "app/ml/classifier.py",
    "app/ml/model_registry.py",
    "app/core/middleware.py",
    "app/core/rate_limit.py",
    "app/middleware/rate_limit.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]
