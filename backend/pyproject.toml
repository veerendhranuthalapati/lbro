[tool.ruff]
line-length = 100
target-version = "py312"
extend-select = ["I", "N", "UP", "B", "SIM", "RUF"]
ignore = ["B008", "N815"]  # B008: do not perform function call in default arg (FastAPI Depends pattern)
exclude = ["app/migrations/"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true
disallow_untyped_defs = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning"]

[tool.coverage.run]
source = ["app"]
omit = ["app/migrations/*", "tests/*"]
