# Add this service to your existing docker/docker-compose.yml
# under the `services:` key, alongside the backend services.

  lbro-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://lbro-backend:8000
    depends_on:
      - lbro-backend
    networks:
      - lbro-network
    restart: unless-stopped
