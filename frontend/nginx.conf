# LBRO nginx configuration — hardened for production
# Phase 9 — DevSecOps: security headers, CSP, rate limiting, compression

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=100r/s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ─────────────────────────────────────────────────────
    # Prevent embedding in iframes (clickjacking)
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Force HTTPS (set HSTS preload in ALB / CloudFront)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Referrer control
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions policy — restrict browser APIs
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Content Security Policy — strict
    # Adjust nonce in production via ALB Lambda@Edge or nginx sub_filter
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob:;
        connect-src 'self' https:;
        media-src 'none';
        object-src 'none';
        frame-src 'none';
        base-uri 'self';
        form-action 'self';
        upgrade-insecure-requests;
    " always;

    # Remove nginx version from headers
    server_tokens off;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml
        image/svg+xml font/ttf font/otf;
    gzip_min_length 1000;
    gzip_disable "msie6";

    # Brotli (if module available)
    # brotli on;
    # brotli_types text/plain text/css application/json application/javascript;

    # ── Static asset caching ─────────────────────────────────────────────────
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        limit_req zone=static_limit burst=200 nodelay;
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-add security headers (add_header doesn't inherit in location blocks)
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        limit_req zone=static_limit burst=200 nodelay;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Health endpoint (for Docker HEALTHCHECK and ALB target group) ────────
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ── API proxy to FastAPI backend ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";           # HTTP/1.1 keepalive
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Security: strip internal headers from response
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        limit_req zone=static_limit burst=100 nodelay;
        try_files $uri $uri/ /index.html;

        # index.html must not be cached (SPA routing)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            # Security headers must be repeated here
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https:; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self';" always;
        }
    }

    # ── Block common attack patterns ─────────────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi|pl|py|sh|bash)$ {
        return 444;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    # Deny access to backup/config files
    location ~* \.(bak|conf|dist|fla|inc|ini|log|psd|sh|sql|swp)$ {
        deny all;
        return 404;
    }
}
